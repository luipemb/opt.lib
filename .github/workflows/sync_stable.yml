name: Sync All Stable Files

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lua
        run: sudo apt-get install -y lua5.1

      - name: Sync Stable Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout main

          for file in *; do
            [ -f "$file" ] || continue
            [[ "$file" == *"."* ]] && continue 
            
            if [[ "$file" == *S ]]; then
              continue
            fi

            echo "------------------------------------------"
            echo "Analyzing base file: $file"
            
            if ! luac -p "$file" 2>/dev/null; then
              echo "  -> [SKIPPED] $file is not a valid Lua script."
              continue
            fi

            VERSION=$(grep -oP 'vers\s*=\s*"\K[^"]+' "$file" | tr -d ' ' || true)
            
            if [ -z "$VERSION" ]; then
              echo "  -> [WARNING] 'vers' variable not found in $file."
              continue
            fi

            echo "  -> Detected version: '$VERSION'"

            if [[ ! "$VERSION" =~ "ex" ]]; then
              STABLE_NAME="${file}S"
              
              echo "  -> [STABLE] Syncing to $STABLE_NAME..."
              cp -f "$file" "$STABLE_NAME"
              git add "$STABLE_NAME"
            else
              echo "  -> [BETA] Version $VERSION is experimental. Skipping sync."
            fi
          done

          if ! git diff --cached --quiet; then
            echo "Changes detected in stable files. Committing..."
            git commit -m "Auto-sync: Global update of stable files"
            git push origin main
          else
            echo "No changes detected. All 'S' files are already up to date."
          fi
