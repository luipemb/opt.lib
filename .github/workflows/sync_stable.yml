name: Sync All Stable Files

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Lua
        run: sudo apt-get install -y lua5.1

      - name: Sync Stable Versions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          for file in $(ls *.lua | grep -v "S.lua"); do
            echo "Analyzing: $file"
            
            if ! luac -p "$file"; then
              echo "  -> [ERROR] Syntax error in $file. Skipping..."
              continue
            fi

            VERSION=$(grep -oP 'vers\s*=\s*"\K[^"]+' "$file" || true)
            
            if [ -z "$VERSION" ]; then
              echo "  -> [SKIPPED] Variable 'vers' not found."
              continue
            fi

            if [[ ! "$VERSION" =~ "ex" ]]; then
              STABLE_NAME="${file%}S"
              
              echo "  -> [OK] Stable version $VERSION detected. Syncing to $STABLE_NAME"
              cp "$file" "$STABLE_NAME"
              git add "$STABLE_NAME"
            else
              echo "  -> [EXP] Experimental version $VERSION detected."
            fi
          done

          if ! git diff --cached --quiet; then
            git commit -m "Auto-sync stable versions"
            git push
          else
            echo "No stable changes to update."
          fi
