name: Sync Stable Version

on:
  push:
    branches:
      - main  # Ou o nome da sua branch principal

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check version and Sync
        run: |
          # 1. Extrai a versão do arquivo original (ajuste o nome do arquivo abaixo)
          VERSION=$(grep -oP 'vers\s*=\s*"\K[^"]+' optlib)
          
          echo "Versao detectada: $VERSION"

          # 2. Verifica se NÃO contém "ex"
          if [[ ! "$VERSION" =~ "ex" ]]; then
            echo "Versao estavel detectada. Sincronizando..."
            cp optlib optlibS
            
            # 3. Configura o robô para commitar a mudança
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add optlibS
            git commit -m "Auto-sync stable version: $VERSION"
            git push
          else
            echo "Ex version ($VERSION). Waiting until a stable version"
          fi
